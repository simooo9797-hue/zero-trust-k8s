---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
        tier: database
    spec:
      containers:
      - name: database
        image: redis:alpine
        ports:
        - containerPort: 6379
