apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-user
  namespace: app
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-admin
  namespace: app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer-role
  namespace: app
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: admin-role
  namespace: app
rules:
- apiGroups: ["", "apps"]
  resources: ["pods", "services", "deployments"]
  verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-binding
  namespace: app
subjects:
- kind: ServiceAccount
  name: dev-user
  namespace: app
roleRef:
  kind: Role
  name: developer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-binding
  namespace: app
subjects:
- kind: ServiceAccount
  name: app-admin
  namespace: app
roleRef:
  kind: Role
  name: admin-role
  apiGroup: rbac.authorization.k8s.io
